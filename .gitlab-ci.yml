image: rust:latest

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cargo/
    - target/

stages:
  - check
  - test
  - build
  - upload

check:
  stage: check
  before_script:
    - rustup component add rustfmt clippy
  script:
    - cargo fmt --all -- --check
    - cargo clippy --all-targets --all-features -- -D warnings

test:
  stage: test
  script:
    - cargo test --verbose

build:
  stage: build
  script:
    - cargo build --release
  artifacts:
    paths:
      - target/release/amorce
    expire_in: 1 week

upload_to_registry:
  stage: upload
  image: curlimages/curl:latest
  dependencies:
    - build
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      VERSION=$(echo "$CI_COMMIT_TAG" | sed 's/^v//')
      echo "Uploading ${BINARY_NAME} version ${VERSION} to GitLab Package Registry..."
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file target/release/${BINARY_NAME} \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/${VERSION}/${BINARY_NAME}-linux-amd64"
